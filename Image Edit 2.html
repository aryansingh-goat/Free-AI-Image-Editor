<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Airforce Image Editor with History</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --surface-color: #1e293b;
            --input-bg: #334155;
            --primary-color: #3b82f6;
            --text-color: #f1f5f9;
            --border-radius: 25px;
            --danger: #ef4444;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            display: flex;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
            box-sizing: border-box;
        }

        .container {
            width: 100%;
            max-width: 1000px;
            background-color: var(--surface-color);
            padding: 2rem;
            border-radius: var(--border-radius);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        h1 {
            text-align: center;
            margin: 0;
            color: var(--text-color);
            font-weight: 800;
        }

        h2 {
            font-size: 1.3rem;
            margin: 0 0 10px 0;
            color: #cbd5e1;
        }

        .description {
            text-align: center;
            color: #94a3b8;
            font-size: 0.9rem;
            margin-bottom: 10px;
        }

        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        @media (max-width: 600px) {
            .grid {
                grid-template-columns: 1fr;
            }
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        label {
            font-size: 0.85rem;
            font-weight: bold;
            color: #cbd5e1;
        }

        label a {
            color: var(--primary-color);
            text-decoration: none;
        }

        input[type="text"],
        input[type="password"],
        textarea,
        input[type="file"],
        select {
            width: 100%;
            padding: 12px;
            background-color: var(--input-bg);
            border: 1px solid #475569;
            color: white;
            border-radius: 6px;
            box-sizing: border-box;
            font-family: inherit;
        }

        input[type="file"]::file-selector-button {
            background-color: var(--primary-color);
            color: white;
            border: none;
            padding: 5px 10px;
            border-radius: 4px;
            cursor: pointer;
            margin-right: 10px;
        }

        select {
            appearance: none;
            cursor: pointer;
        }

        button {
            background-color: var(--primary-color);
            color: white;
            padding: 15px;
            border: none;
            border-radius: 15px;
            cursor: pointer;
            font-size: 1.1rem;
            font-weight: bold;
            transition: all 0.2s;
            margin-top: 15px;
        }

        button:hover {
            background-color: #2563eb;
            transform: translateY(-1px);
        }

        button:disabled {
            background-color: #475569;
            cursor: not-allowed;
            transform: none;
        }

        .secondary-btn {
            background-color: #475569;
            font-size: 0.9rem;
            padding: 8px 15px;
            border-radius: 8px;
            margin: 5px;
            font-weight: normal;
        }

        .secondary-btn:hover {
            background-color: #5f6c80;
        }

        .danger-btn {
            background-color: var(--danger);
        }
        .danger-btn:hover {
            background-color: #dc2626;
        }

        .preview-area {
            display: flex;
            gap: 20px;
            margin-top: 20px;
            flex-wrap: wrap;
        }

        .image-card {
            flex: 1;
            min-width: 250px;
            background-color: #0f172a;
            padding: 10px;
            border-radius: var(--border-radius);
            text-align: center;
            border: 1px solid #334155;
        }

        .image-card h3 {
            margin: 0 0 10px 0;
            color: #94a3b8;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .image-card img {
            max-width: 100%;
            border-radius: 6px;
            display: none;
        }

        #status {
            padding: 12px;
            border-radius: 6px;
            font-family: 'Courier New', monospace;
            font-size: 0.85rem;
            white-space: pre-wrap;
            background-color: #000;
            color: #00ff00;
            display: none;
            max-height: 150px;
            overflow-y: auto;
        }

        /* History section */
        .history-section {
            background-color: #0f172a;
            border-radius: var(--border-radius);
            padding: 1.5rem;
            border: 1px solid #334155;
            margin-top: 10px;
        }

        .history-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 15px;
        }

        .history-list {
            display: flex;
            flex-direction: column;
            gap: 15px;
            max-height: 600px;
            overflow-y: auto;
            padding-right: 5px;
        }

        .history-item {
            background-color: #1e293b;
            border-radius: 12px;
            padding: 15px;
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            align-items: flex-start;
            border: 1px solid #334155;
            position: relative;
        }

        .history-thumbnails {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            align-items: center;
        }

        .history-thumb {
            width: 100px;
            height: 100px;
            object-fit: cover;
            border-radius: 8px;
            border: 1px solid #475569;
            background-color: #0f172a;
        }

        .history-info {
            flex: 1;
            min-width: 200px;
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .history-prompt {
            font-weight: bold;
            color: #f1f5f9;
            word-break: break-word;
        }

        .history-meta {
            font-size: 0.8rem;
            color: #94a3b8;
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
        }

        .history-actions {
            display: flex;
            gap: 8px;
            align-items: center;
            margin-top: 5px;
        }

        .delete-entry {
            background-color: transparent;
            border: 1px solid var(--danger);
            color: var(--danger);
            padding: 4px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.8rem;
            transition: 0.2s;
            margin: 0;
        }

        .delete-entry:hover {
            background-color: var(--danger);
            color: white;
        }

        .open-image {
            background-color: transparent;
            border: 1px solid var(--primary-color);
            color: var(--primary-color);
            padding: 4px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.8rem;
            transition: 0.2s;
            margin: 0;
        }

        .open-image:hover {
            background-color: var(--primary-color);
            color: white;
        }

        .no-history {
            text-align: center;
            color: #64748b;
            font-style: italic;
            padding: 20px;
        }

        footer {
            background-color: var(--bg-color);
            color: var(--text-color);
            padding: 15px;
            border-radius: 15px;
            text-align: center;
            margin-top: 10px;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>AI Image Editor</h1>
    <p class="description">Hosts your local Image to a URL via ImgBB → Sends URL to Airforce AI → Returns Edited Image (with history)</p>

    <div class="grid">
        <div class="input-group">
            <label for="airforceKey">1. Airforce API Key (<a href="https://panel.api.airforce/dashboard" target="_blank">Get Key</a>)</label>
            <input type="password" id="airforceKey" placeholder="Required for editing images">
        </div>
        <div class="input-group">
            <label for="imgbbKey">2. ImgBB API Key (<a href="https://api.imgbb.com/" target="_blank">Get Free Key</a>)</label>
            <input type="password" id="imgbbKey" placeholder="Required for hosting your image">
        </div>
    </div>

    <div class="input-group">
        <label for="modelSelect">3. Model</label>
        <select id="modelSelect">
            <option value="nano-banana-2">Nanobanana 2</option>
            <option value="nano-banana-2-search">Nanobanana 2 Search</option>
            <option value="image-1-edit">Image 1 Edit</option>
            <option value="nano-banana-pro">Nanobanana Pro</option>
            <option value="flux-2-pro">Flux 2 Pro</option>
            <option value="flux-2-flex">Flux-2-flex</option>
        </select>
    </div>

    <div class="input-group">
        <label for="fileInput">4. Select Your Image</label>
        <input type="file" id="fileInput" accept="image/*">
    </div>

    <div class="input-group">
        <label for="prompt">5. Prompt to Edit Image</label>
        <textarea id="prompt" rows="2" placeholder="Describe the change to be done to your Image.."></textarea>
    </div>

    <button id="generateBtn">Edit Image</button>

    <div id="status"></div>

    <div class="preview-area">
        <div class="image-card">
            <h3>Original Image</h3>
            <img id="originalPreview" alt="Original">
        </div>
        <div class="image-card">
            <h3>Edited Image</h3>
            <img id="resultPreview" alt="Result">
        </div>
    </div>

    <!-- History Section -->
    <div class="history-section">
        <div class="history-header">
            <h2>📜 Edit History</h2>
            <button id="clearHistoryBtn" class="secondary-btn danger-btn">Clear All History</button>
        </div>
        <div id="historyList" class="history-list">
            <div class="no-history">No edits yet. Generate an image to start building history.</div>
        </div>
    </div>

    <footer>
        <label>Made by <a href="https://discord.com/channels/1455919196113469442/1455919197681877098" target="_blank">Aryan Singh</a></label>
    </footer>
</div>

<script>
    (function() {
        // DOM elements
        const fileInput = document.getElementById('fileInput');
        const originalPreview = document.getElementById('originalPreview');
        const resultPreview = document.getElementById('resultPreview');
        const generateBtn = document.getElementById('generateBtn');
        const statusDiv = document.getElementById('status');
        const promptInput = document.getElementById('prompt');
        const airforceKeyInput = document.getElementById('airforceKey');
        const imgbbKeyInput = document.getElementById('imgbbKey');
        const modelSelect = document.getElementById('modelSelect');
        const historyListContainer = document.getElementById('historyList');
        const clearHistoryBtn = document.getElementById('clearHistoryBtn');

        let selectedFile = null;
        let history = [];

        // Logger
        function log(msg, type = 'info') {
            statusDiv.style.display = 'block';
            const color = type === 'error' ? '#ff5555' : (type === 'success' ? '#50fa7b' : '#f1f5f9');
            const time = new Date().toLocaleTimeString();
            statusDiv.innerHTML += `<div style="color:${color}">[${time}] ${msg}</div>`;
            statusDiv.scrollTop = statusDiv.scrollHeight;
        }

        // Preview local image
        fileInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (!file) return;
            selectedFile = file;
            const reader = new FileReader();
            reader.onload = (event) => {
                originalPreview.src = event.target.result;
                originalPreview.style.display = 'block';
                log(`Loaded local file: ${file.name} (${(file.size/1024).toFixed(1)} KB)`);
            };
            reader.readAsDataURL(file);
        });

        // Helper: Upload to ImgBB
        async function uploadToImgBB(file, apiKey) {
            const formData = new FormData();
            formData.append('image', file);
            formData.append('expiration', 600);
            const response = await fetch(`https://api.imgbb.com/1/upload?key=${apiKey}`, {
                method: 'POST',
                body: formData
            });
            const result = await response.json();
            if (!result.success) {
                throw new Error('ImgBB Upload Failed: ' + (result.error?.message || 'Unknown error'));
            }
            return result.data.url;
        }

        // Resize an image (data URL) to a maximum dimension, returns JPEG data URL
        function resizeImage(dataUrl, maxDim = 300) {
            return new Promise((resolve, reject) => {
                const img = new Image();
                img.crossOrigin = 'anonymous';
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    let { width, height } = img;
                    if (width > height) {
                        if (width > maxDim) {
                            height *= maxDim / width;
                            width = maxDim;
                        }
                    } else {
                        if (height > maxDim) {
                            width *= maxDim / height;
                            height = maxDim;
                        }
                    }
                    canvas.width = width;
                    canvas.height = height;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0, width, height);
                    resolve(canvas.toDataURL('image/jpeg', 0.7));
                };
                img.onerror = () => reject(new Error('Failed to load image for resize'));
                img.src = dataUrl;
            });
        }

        // Load history from localStorage
        function loadHistory() {
            try {
                const stored = localStorage.getItem('airforceImageHistory');
                if (stored) {
                    history = JSON.parse(stored);
                } else {
                    history = [];
                }
            } catch (e) {
                console.warn('Could not parse history', e);
                history = [];
            }
        }

        // Save history to localStorage
        function saveHistory() {
            localStorage.setItem('airforceImageHistory', JSON.stringify(history));
        }

        // Add new entry to history
        async function addHistoryEntry(originalDataUrl, editedUrl, prompt, model) {
            try {
                // Resize original to a manageable thumbnail (300px) for storage and display
                const originalThumb = await resizeImage(originalDataUrl, 300);
                const entry = {
                    id: Date.now(),
                    timestamp: new Date().toISOString(),
                    prompt: prompt || 'No prompt',
                    model: model,
                    originalThumb: originalThumb,
                    editedUrl: editedUrl
                };
                history.unshift(entry);
                // Keep only the last 25 entries to avoid localStorage overflow
                if (history.length > 25) {
                    history = history.slice(0, 25);
                }
                saveHistory();
                renderHistory();
                log('✅ Edit saved to history.', 'success');
            } catch (err) {
                log('⚠️ Could not save thumbnail to history: ' + err.message, 'error');
            }
        }

        // Delete a single history entry
        function deleteHistoryEntry(id) {
            history = history.filter(entry => entry.id !== id);
            saveHistory();
            renderHistory();
        }

        // Clear all history
        function clearAllHistory() {
            if (confirm('Delete all edit history? This cannot be undone.')) {
                history = [];
                saveHistory();
                renderHistory();
                log('History cleared.', 'info');
            }
        }

        // Render history list
        function renderHistory() {
            if (!historyListContainer) return;
            if (history.length === 0) {
                historyListContainer.innerHTML = '<div class="no-history">No edits yet. Generate an image to start building history.</div>';
                return;
            }

            let html = '';
            history.forEach(entry => {
                const date = new Date(entry.timestamp).toLocaleString();
                const promptSnippet = entry.prompt.length > 60 ? entry.prompt.substring(0, 60) + '...' : entry.prompt;
                html += `
                    <div class="history-item" data-id="${entry.id}">
                        <div class="history-thumbnails">
                            <img class="history-thumb" src="${entry.originalThumb}" alt="Original thumbnail" loading="lazy">
                            <span style="color:#94a3b8; margin:0 5px;">→</span>
                            <img class="history-thumb" src="${entry.editedUrl}" alt="Edited thumbnail" loading="lazy" onerror="this.src='data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22%3E%3Crect fill=%22%23334155%22 width=%22100%22 height=%22100%22/%3E%3Ctext x=%2250%22 y=%2255%22 text-anchor=%22middle%22 fill=%22%2394a3b8%22 font-size=%2214%22%3EExpired%3C/text%3E%3C/svg%3E'; this.alt='Image unavailable';">
                        </div>
                        <div class="history-info">
                            <div class="history-prompt" title="${entry.prompt.replace(/"/g, '&quot;')}">${promptSnippet}</div>
                            <div class="history-meta">
                                <span>🧠 ${entry.model}</span>
                                <span>🕒 ${date}</span>
                            </div>
                            <div class="history-actions">
                                <button class="open-image" onclick="window.open('${entry.editedUrl}', '_blank')">🔗 Open Edited</button>
                                <button class="delete-entry" onclick="document.dispatchEvent(new CustomEvent('deleteHistory', {detail: ${entry.id}}))">🗑 Delete</button>
                            </div>
                        </div>
                    </div>
                `;
            });

            historyListContainer.innerHTML = html;
        }

        // Event listener for delete buttons (using custom events for clean separation)
        document.addEventListener('deleteHistory', (e) => {
            deleteHistoryEntry(e.detail);
        });

        // Clear history button
        clearHistoryBtn.addEventListener('click', clearAllHistory);

        // Main process
        generateBtn.addEventListener('click', async () => {
            const airforceKey = airforceKeyInput.value.trim();
            const imgbbKey = imgbbKeyInput.value.trim();
            const prompt = promptInput.value.trim();

            if (!airforceKey || !imgbbKey) return log("Error: Both Airforce and Imgbb API keys are required.", "error");
            if (!selectedFile) return log("Error: Please select an image first.", "error");
            if (!prompt) return log("Error: Please enter a prompt.", "error");

            generateBtn.disabled = true;
            resultPreview.style.display = 'none';
            statusDiv.innerHTML = '';

            try {
                log("Step 1/2: Uploading image to temporary host...");
                generateBtn.textContent = "Uploading...";

                const publicUrl = await uploadToImgBB(selectedFile, imgbbKey);
                log(`Upload success! URL: ${publicUrl}`, "success");

                log("Step 2/2: Sending to Airforce AI...");
                generateBtn.textContent = "Processing AI...";

                const response = await fetch("https://api.airforce/v1/images/generations", {
                    method: "POST",
                    headers: {
                        "Authorization": `Bearer ${airforceKey}`,
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                        "model": modelSelect.value,
                        "prompt": prompt,
                        "n": 1,
                        "size": "1024x1024",
                        "response_format": "url",
                        "sse": true,
                        "aspectRatio": "1:1",
                        "resolution": "1k",
                        "image_urls": [publicUrl]
                    })
                });

                if (!response.ok) {
                    const err = await response.text();
                    throw new Error(`Airforce API Error: ${err}`);
                }

                const reader = response.body.getReader();
                const decoder = new TextDecoder();
                let accumulatedData = '';
                let finalUrl = null;

                log("Stream connection open. Waiting for pixels...");

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;

                    accumulatedData += decoder.decode(value, { stream: true });
                    const lines = accumulatedData.split('\n\n');
                    accumulatedData = lines.pop();

                    for (const line of lines) {
                        if (line.startsWith('data: ')) {
                            const dataStr = line.slice(6);
                            if (dataStr === '[DONE]') break;
                            if (dataStr === ': keepalive') continue;

                            try {
                                const json = JSON.parse(dataStr);
                                if (json.data?.[0]?.url) finalUrl = json.data[0].url;
                                else if (json.url) finalUrl = json.url;

                                if (finalUrl) {
                                    log("Image generated!", "success");
                                    resultPreview.src = finalUrl;
                                    resultPreview.style.display = 'block';

                                    // Wait for the result image to load, then add history
                                    resultPreview.onload = async () => {
                                        // Use the original data URL from the preview (full resolution)
                                        const originalDataUrl = originalPreview.src;
                                        await addHistoryEntry(originalDataUrl, finalUrl, prompt, modelSelect.value);
                                    };
                                    // If the image is already cached, onload might not fire again; trigger manually if complete
                                    if (resultPreview.complete) {
                                        const originalDataUrl = originalPreview.src;
                                        await addHistoryEntry(originalDataUrl, finalUrl, prompt, modelSelect.value);
                                    }
                                }
                            } catch (e) {
                                console.warn("Parse error", e);
                            }
                        }
                    }
                }

                if (!finalUrl) {
                    log("No image URL received in stream.", "error");
                }

            } catch (error) {
                log(error.message, "error");
                console.error(error);
            } finally {
                generateBtn.disabled = false;
                generateBtn.textContent = "Edit Image";
            }
        });

        // Initialize on page load: load history and render
        loadHistory();
        renderHistory();
    })();
</script>

</body>
</html>
