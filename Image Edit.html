<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Airforce Image Editor</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --surface-color: #1e293b;
            --input-bg: #334155;
            --primary-color: #3b82f6;
            --text-color: #f1f5f9;
            --border-radius: 25px;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            display: flex;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
            box-sizing: border-box;
        }

        .container {
            width: 100%;
            max-width: 900px;
            background-color: var(--surface-color);
            padding: 2rem;
            border-radius: var(--border-radius);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        h1 {
            text-align: center;
            margin: 0;
            color: var(--text-color);
            font-weight: 800;
        }

        .description {
            text-align: center;
            color: #94a3b8;
            font-size: 0.9rem;
            margin-bottom: 10px;
        }

        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        @media (max-width: 600px) {
            .grid { grid-template-columns: 1fr; }
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        label {
            font-size: 0.85rem;
            font-weight: bold;
            color: #cbd5e1;
        }
        
        label a {
            color: var(--primary-color);
            text-decoration: none;
        }

        input[type="text"], 
        input[type="password"], 
        textarea,
        input[type="file"],
        select {
            width: 100%;
            padding: 12px;
            background-color: var(--input-bg);
            border: 1px solid #475569;
            color: white;
            border-radius: 6px;
            box-sizing: border-box;
            font-family: inherit;
        }

        input[type="file"]::file-selector-button {
            background-color: var(--primary-color);
            color: white;
            border: none;
            padding: 5px 10px;
            border-radius: 4px;
            cursor: pointer;
            margin-right: 10px;
        }

        select {
            appearance: none; /* Remove default arrow for consistent styling */
            cursor: pointer;
        }

        button {
            background-color: var(--primary-color);
            color: white;
            padding: 15px;
            border: thin;
            border-radius: 15px;
            cursor: pointer;
            font-size: 1.1rem;
            font-weight: bold;
            transition: all 0.2s;
            margin-top: 15px;
        }

        button:hover {
            background-color: #2563eb;
            transform: translateY(-1px);
        }

        button:disabled {
            background-color: #475569;
            cursor: not-allowed;
            transform: none;
        }

        .preview-area {
            display: flex;
            gap: 20px;
            margin-top: 20px;
            flex-wrap: wrap;
        }

        .image-card {
            flex: 1;
            min-width: 300px;
            background-color: #0f172a;
            padding: 10px;
            border-radius: var(--border-radius);
            text-align: center;
            border: 1px solid #334155;
        }

        .image-card h3 {
            margin: 0 0 10px 0;
            color: #94a3b8;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .image-card img {
            max-width: 100%;
            border-radius: 6px;
            display: none;
        }

        #status {
            padding: 12px;
            border-radius: 6px;
            font-family: 'Courier New', monospace;
            font-size: 0.85rem;
            white-space: pre-wrap;
            background-color: #000;
            color: #00ff00;
            display: none;
            max-height: 150px;
            overflow-y: auto;
        }
        footer {
            background-color: var(--bg-color);
            color: var(--text-color);
            padding: 20px;
            border-radius: 15px;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>AI Image Editor</h1>
    <p class="description">Hosts your local Image to a URL via ImgBB -> Sends URL of the Image to Airforce AI to Edit -> Returns Edited Image</p>
    
    <div class="grid">
        <div class="input-group">
            <label for="airforceKey">1. Airforce API Key (<a href="https://panel.api.airforce/dashboard" target="_blank">Get Your Airforce API</a>)</label>
            <input type="password" id="airforceKey" placeholder="Required for editing images">
        </div>
        <div class="input-group">
            <label for="imgbbKey">2. *ImgBB API Key (<a href="https://api.imgbb.com/" target="_blank">Get Free Imgbb API</a>)</label>
            <input type="password" id="imgbbKey" placeholder="Required for hosting your image">
        </div>
    </div>

    <!-- NEW MODEL SELECTOR (Step 3) -->
    <div class="input-group">
        <label for="modelSelect">3. Model</label>
        <select id="modelSelect">
            <!-- Current default model - you can replace these tags and names -->
            <option value="nano-banana-2">Nanobanana 2</option>
            <option value="nano-banana-2-search">Nanobanana 2 Search</option>
            <option value="image-1-edit">Image 1 Edit</option>
            <option value="nano-banana-pro">Nanobanana Pro</option>
            <option value="flux-2-pro">Flux 2 Pro</option>
            <option value="flux-2-flex">Flux-2-flex</option>
        </select>
    </div>

    <div class="input-group">
        <label for="fileInput">4. Select Your Image</label>
        <input type="file" id="fileInput" accept="image/*">
    </div>

    <div class="input-group">
        <label for="prompt">5. Prompt to Edit Image</label>
        <textarea id="prompt" rows="2" placeholder="Describe the change to be done to the your Image.."></textarea>
    </div>

    <button id="generateBtn">Edit Image</button>

    <div id="status"></div>

    <div class="preview-area">
        <div class="image-card">
            <h3>Original Image</h3>
            <img id="originalPreview" alt="Original">
        </div>
        <div class="image-card">
            <h3>Edited Image</h3>
            <img id="resultPreview" alt="Result">
        </div>

        <label for="airforceKey"><h5> *Airforce models need hosted URLs of Image to edit them. </h5></label>
    </div>
    <footer> <label for="footer"> Made by <a href = "https://discord.com/channels/1455919196113469442/1455919197681877098"> Aryan Singh </a> </label></footer>

</div>

<script>
    const fileInput = document.getElementById('fileInput');
    const originalPreview = document.getElementById('originalPreview');
    const resultPreview = document.getElementById('resultPreview');
    const generateBtn = document.getElementById('generateBtn');
    const statusDiv = document.getElementById('status');
    const promptInput = document.getElementById('prompt');
    const airforceKeyInput = document.getElementById('airforceKey');
    const imgbbKeyInput = document.getElementById('imgbbKey');
    const modelSelect = document.getElementById('modelSelect'); // NEW

    let selectedFile = null;

    // Logger
    function log(msg, type = 'info') {
        statusDiv.style.display = 'block';
        const color = type === 'error' ? '#ff5555' : (type === 'success' ? '#50fa7b' : '#f1f5f9');
        const time = new Date().toLocaleTimeString();
        statusDiv.innerHTML += `<div style="color:${color}">[${time}] ${msg}</div>`;
        statusDiv.scrollTop = statusDiv.scrollHeight;
    }

    // Preview Local Image
    fileInput.addEventListener('change', (e) => {
        const file = e.target.files[0];
        if (!file) return;
        selectedFile = file;
        const reader = new FileReader();
        reader.onload = (event) => {
            originalPreview.src = event.target.result;
            originalPreview.style.display = 'block';
            log(`Loaded local file: ${file.name} (${(file.size/1024).toFixed(1)} KB)`);
        };
        reader.readAsDataURL(file);
    });

    // Helper: Upload to ImgBB
    async function uploadToImgBB(file, apiKey) {
        const formData = new FormData();
        formData.append('image', file);
        // Expiration: 600 seconds (10 mins) - ample time for AI to process, then auto-deletes
        formData.append('expiration', 600); 

        const response = await fetch(`https://api.imgbb.com/1/upload?key=${apiKey}`, {
            method: 'POST',
            body: formData
        });

        const result = await response.json();
        if (!result.success) {
            throw new Error('ImgBB Upload Failed: ' + (result.error?.message || 'Unknown error'));
        }
        return result.data.url;
    }

    // Main Process
    generateBtn.addEventListener('click', async () => {
        const airforceKey = airforceKeyInput.value.trim();
        const imgbbKey = imgbbKeyInput.value.trim();
        const prompt = promptInput.value.trim();

        if (!airforceKey || !imgbbKey) return log("Error: Both Airforce and Imgbb API keys are required.", "error");
        if (!selectedFile) return log("Error: Please select an image first.", "error");
        if (!prompt) return log("Error: Please enter a prompt.", "error");

        generateBtn.disabled = true;
        resultPreview.style.display = 'none';
        statusDiv.innerHTML = ''; // Clear logs

        try {
            // Step 1: Upload to Image Host
            log("Step 1/2: Uploading image to temporary host...");
            generateBtn.textContent = "Uploading...";
            
            const publicUrl = await uploadToImgBB(selectedFile, imgbbKey);
            log(`Upload success! URL: ${publicUrl}`, "success");

            // Step 2: Call AI API with the selected model
            log("Step 2/2: Sending to Airforce AI...");
            generateBtn.textContent = "Processing AI...";

            const response = await fetch("https://api.airforce/v1/images/generations", {
                method: "POST",
                headers: {
                    "Authorization": `Bearer ${airforceKey}`,
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    "model": modelSelect.value,  // <--- Uses the selected model tag
                    "prompt": prompt,
                    "n": 1,
                    "size": "1024x1024",
                    "response_format": "url",
                    "sse": true,
                    "aspectRatio": "1:1",
                    "resolution": "1k",
                    "image_urls": [ publicUrl ]
                })
            });

            if (!response.ok) {
                const err = await response.text();
                throw new Error(`Airforce API Error: ${err}`);
            }

            // Step 3: Handle Stream
            const reader = response.body.getReader();
            const decoder = new TextDecoder();
            let accumulatedData = '';
            let finalUrl = null;

            log("Stream connection open. Waiting for pixels...");

            while (true) {
                const { done, value } = await reader.read();
                if (done) break;

                accumulatedData += decoder.decode(value, { stream: true });
                const lines = accumulatedData.split('\n\n');
                accumulatedData = lines.pop();

                for (const line of lines) {
                    if (line.startsWith('data: ')) {
                        const dataStr = line.slice(6);
                        if (dataStr === '[DONE]') break;
                        if (dataStr === ': keepalive') continue;

                        try {
                            const json = JSON.parse(dataStr);
                            if (json.data?.[0]?.url) finalUrl = json.data[0].url;
                            else if (json.url) finalUrl = json.url;
                            
                            if (finalUrl) {
                                log("Image generated!", "success");
                                resultPreview.src = finalUrl;
                                resultPreview.style.display = 'block';
                            }
                        } catch (e) {
                            console.warn("Parse error", e);
                        }
                    }
                }
            }

        } catch (error) {
            log(error.message, "error");
            console.error(error);
        } finally {
            generateBtn.disabled = false;
            generateBtn.textContent = "Upload & Edit Image";
        }
    });
</script>

</body>
</html>
